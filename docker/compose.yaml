services:
  db:
    image: postgres:16-alpine
    container_name: base-project-db
    environment:
      POSTGRES_DB: base_project
      POSTGRES_USER: base_project
      POSTGRES_PASSWORD: base_project
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U base_project -d base_project"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro

volumes:
  db-data:
