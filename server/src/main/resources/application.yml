spring:
  application:
    name: base-project-api
  datasource:
    url: jdbc:postgresql://${APP_DB_HOST:localhost}:${APP_DB_PORT:5432}/${APP_DB_NAME:base_project}
    username: ${APP_DB_USERNAME:base_project}
    password: ${APP_DB_PASSWORD:base_project}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
  docker:
    compose:
      enabled: true
      file: docker/compose.yaml

app:
  version: 0.1.0-SNAPSHOT

info:
  app:
    name: ${spring.application.name}
    version: ${app.version}

management:
  endpoints:
    access:
      max-permitted: read-only
    web:
      exposure:
        include:
          - health
          - info
  endpoint:
    health:
      probes:
        enabled: true
    info:
      access: read-only
  info:
    env:
      enabled: true
